<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每周一好评 - 网页版</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>

        :root {
            --bg0:#05060a; --bg1:#0a0d16;
            --ink:#f3ecdd; --ink-soft:#cbc4b6; --muted:#8b8577;
            --line: rgba(255,255,255,0.08);
            --line-2: rgba(255,255,255,0.05);
            --card: rgba(18,22,34,0.62);
            --card-2: rgba(26,31,46,0.55);
            --gold:#f0b45f; --gold-2:#ffd98a; --gold-soft: rgba(240,180,95,0.14); --gold-line: rgba(240,180,95,0.32);
            --coral:#e8814f; --coral-2:#d76a3a; --coral-3:#c85c30;
            --blue:#6fb7ff;
            --rose:#c85a86;
            --ok:#7fd0a0; --ok-soft: rgba(127,208,160,0.12); --ok-line: rgba(127,208,160,0.3);
            --warn:#e8b86d; --warn-soft: rgba(232,184,109,0.12); --warn-line: rgba(232,184,109,0.28);
            --danger:#e07a7a;
            --r-xl:24px; --r-lg:18px; --r-md:12px; --r-sm:10px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body {
            font-family:"Inter",-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
            color:var(--ink-soft);
            background:
                radial-gradient(120% 70% at 50% 118%, rgba(232,129,79,0.10), transparent 60%),
                radial-gradient(80% 60% at 50% -10%, rgba(111,183,255,0.06), transparent 60%),
                linear-gradient(180deg,#0a0d16 0%,#06070d 50%,#05060a 100%);
            background-attachment:fixed;
            min-height:100vh; overflow-x:hidden; -webkit-font-smoothing:antialiased;
        }
        #bgfx { position:fixed; inset:0; z-index:0; width:100vw; height:100vh; display:block; pointer-events:none; }

        .app { position:relative; z-index:1; max-width:1180px; margin:0 auto; padding:52px 22px 80px; }

        .hero { text-align:center; margin-bottom:32px; animation:rise .7s cubic-bezier(.2,.7,.2,1) both; }
        .hero-eyebrow {
            display:inline-flex; align-items:center; gap:8px;
            font-size:10.5px; font-weight:600; letter-spacing:.24em; text-transform:uppercase; color:var(--gold);
            margin-bottom:18px; padding:6px 15px;
            background:var(--gold-soft); border:1px solid var(--gold-line); border-radius:999px;
        }
        .hero-eyebrow::before { content:""; width:6px; height:6px; border-radius:50%; background:var(--gold); box-shadow:0 0 10px var(--gold); }
        .hero h1 {
            font-family:"Lora",Georgia,serif; font-size:clamp(2.4rem,5.5vw,3.4rem); font-weight:500;
            color:var(--ink); letter-spacing:-.02em; line-height:1.1; text-shadow:0 4px 50px rgba(240,180,95,.2);
        }
        .hero h1 em { font-style:italic; color:var(--gold-2); }
        .hero p { margin:14px auto 0; max-width:34em; font-size:1rem; color:var(--muted); line-height:1.6; }

        /* two-column */
        .layout { display:grid; grid-template-columns:1.08fr 0.92fr; gap:20px; align-items:start; }
        @media (max-width:940px){ .layout{ grid-template-columns:1fr; } }

        .workspace, .preview-panel {
            background:var(--card); backdrop-filter:blur(20px) saturate(1.3); -webkit-backdrop-filter:blur(20px) saturate(1.3);
            border:1px solid var(--line); border-radius:var(--r-xl);
            box-shadow:0 1px 0 rgba(255,255,255,.05) inset, 0 30px 60px -30px rgba(0,0,0,.7);
            padding:28px; animation:rise .8s cubic-bezier(.2,.7,.2,1) .06s both;
        }
        .preview-panel { position:sticky; top:22px; }
        @media (max-width:940px){ .preview-panel{ position:static; } }
        @media (max-width:560px){ .workspace,.preview-panel{ padding:20px; } .app{ padding:40px 14px 60px; } }

        /* section titles */
        .panel { margin-bottom:22px; }
        .panel-head { margin-bottom:15px; }
        .panel-title { display:inline-flex; align-items:center; gap:9px; font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); }
        .panel-title::before { content:""; width:15px; height:2px; border-radius:2px; background:linear-gradient(90deg,var(--gold),transparent); }
        .panel-sub { font-size:.85rem; color:var(--muted); margin-top:6px; }

        /* date */
        .date-row { display:flex; flex-wrap:wrap; align-items:flex-end; gap:8px; }
        .date-field { flex:1; min-width:60px; }
        .date-field.year-field { flex:1.25; min-width:76px; }
        .date-field label { display:block; font-size:10px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
        .date-input {
            width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:var(--r-sm);
            background:rgba(255,255,255,0.04); font-family:"Inter",sans-serif; font-size:15px; font-weight:600; color:var(--ink);
            transition:border-color .18s, box-shadow .18s, background .18s;
        }
        .date-input::placeholder { color:#5f5c55; font-weight:500; }
        .date-input:hover { border-color:rgba(255,255,255,0.16); }
        .date-input:focus { outline:none; background:rgba(255,255,255,0.07); border-color:var(--gold); box-shadow:0 0 0 3px rgba(240,180,95,.16); }
        .date-sep { color:#544f47; padding-bottom:11px; }

        .section-divider { height:1px; margin:24px 0; background:linear-gradient(90deg,transparent,var(--line),transparent); }

        /* platform cards */
        .platform-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
        @media (max-width:560px){ .platform-grid{ grid-template-columns:1fr; } }
        .platform-card {
            position:relative; padding:20px; border-radius:var(--r-lg);
            background:var(--card-2); border:1px solid var(--line);
            display:flex; flex-direction:column; gap:16px; overflow:hidden;
            transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
        }
        .platform-card::before { content:""; position:absolute; top:0; left:20px; right:20px; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); opacity:.5; transition:opacity .2s; }
        .platform-card:hover { transform:translateY(-3px); border-color:var(--gold-line); box-shadow:0 18px 40px -20px rgba(0,0,0,.7); }
        .platform-card:hover::before { opacity:.9; }
        .platform-card.found { border-color:var(--ok-line); box-shadow:0 0 0 1px var(--ok-line), 0 14px 34px -22px rgba(0,0,0,.7); }
        .platform-card.found::before { background:linear-gradient(90deg,transparent,var(--ok),transparent); opacity:.8; }
        .platform-top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
        .platform-tag { font-size:9.5px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
        .mapping-title { font-family:"Lora",Georgia,serif; font-size:1.2rem; font-weight:500; color:var(--ink); line-height:1.2; }
        .mapping-filename { font-size:12px; color:var(--muted); margin-top:5px; word-break:break-all; line-height:1.45; }
        .mapping-status { padding:4px 11px; border-radius:999px; font-size:10.5px; font-weight:700; letter-spacing:.02em; white-space:nowrap; flex-shrink:0; }
        .mapping-status.found { background:var(--ok-soft); color:var(--ok); border:1px solid var(--ok-line); }
        .mapping-status.missing { background:var(--warn-soft); color:var(--warn); border:1px solid var(--warn-line); }
        .platform-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

        /* buttons */
        .btn { position:relative; display:inline-flex; align-items:center; justify-content:center; gap:6px;
            padding:11px 16px; border:1px solid transparent; border-radius:var(--r-sm);
            font-family:"Inter",sans-serif; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap;
            transition:transform .16s, box-shadow .18s, background .18s, border-color .18s, color .18s; }
        .btn:active { transform:scale(.98); }
        .btn:disabled { opacity:.45; cursor:not-allowed; }
        .btn-ghost { background:rgba(255,255,255,0.05); color:var(--ink-soft); border-color:var(--line); }
        .btn-ghost:hover { background:rgba(255,255,255,0.09); border-color:var(--gold-line); color:var(--gold-2); }
        .btn-clay { background:linear-gradient(180deg,var(--coral),var(--coral-2) 60%,var(--coral-3)); color:#fff; border-color:var(--coral-3);
            box-shadow:inset 0 1px 0 rgba(255,255,255,.28), 0 8px 22px -8px rgba(232,129,79,.6); text-shadow:0 1px 1px rgba(120,50,25,.4); }
        .btn-clay:hover { transform:translateY(-2px); box-shadow:inset 0 1px 0 rgba(255,255,255,.3), 0 14px 30px -10px rgba(232,129,79,.7); }
        .btn-outline { background:rgba(255,255,255,0.04); color:var(--ink-soft); border-color:var(--line); }
        .btn-outline:hover { background:rgba(255,255,255,0.08); border-color:var(--ink-soft); color:var(--ink); }
        .btn-sm { padding:10px 12px; font-size:12.5px; }

        /* settings row */
        .settings-card { display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;
            padding:16px 18px; border-radius:var(--r-lg); background:var(--card-2); border:1px solid var(--line); }
        .settings-left { display:flex; align-items:center; gap:13px; }
        .settings-icon { width:40px; height:40px; border-radius:var(--r-md); flex-shrink:0; background:var(--gold-soft); border:1px solid var(--gold-line);
            display:flex; align-items:center; justify-content:center; font-size:17px; }
        .settings-card .mapping-title { font-size:1rem; }
        .mapping-edit-btn { padding:9px 15px; border-radius:var(--r-sm); cursor:pointer; background:rgba(255,255,255,0.05); color:var(--ink-soft);
            border:1px solid var(--line); font-family:"Inter",sans-serif; font-size:12.5px; font-weight:600; transition:all .16s; }
        .mapping-edit-btn:hover { border-color:var(--gold-line); color:var(--gold-2); }

        /* action bar */
        .action-bar { display:flex; gap:10px; flex-wrap:wrap; margin-top:24px; padding-top:22px; border-top:1px solid var(--line-2); }
        .action-bar .btn-clay { flex:1; min-width:150px; padding:14px 22px; font-size:14.5px; border-radius:12px; }

        /* progress */
        .progress-section { display:none; margin-top:16px; padding:16px 18px; background:var(--card-2); border-radius:var(--r-md); border:1px solid var(--line); }
        .progress-bar { height:5px; background:rgba(255,255,255,0.07); border-radius:999px; overflow:hidden; margin-bottom:9px; }
        .progress-fill { height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--coral),var(--gold)); box-shadow:0 0 12px rgba(240,180,95,.5); transition:width .35s ease; }
        .progress-text { font-size:12.5px; color:var(--muted); font-weight:500; }

        /* ==== preview panel ==== */
        .preview-head { display:flex; align-items:baseline; gap:10px; margin-bottom:16px; }
        .preview-eyebrow { font-size:10px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--gold); }
        .preview-head h3 { font-family:"Lora",Georgia,serif; font-size:1.1rem; font-weight:500; color:var(--ink); }
        .preview-slots { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
        @media (max-width:400px){ .preview-slots{ grid-template-columns:1fr; } }
        .pslot { display:flex; flex-direction:column; gap:9px; margin:0; }
        .pslot-tag { font-size:11px; font-weight:600; letter-spacing:.04em; color:var(--ink-soft); text-align:center; }
        .pslot-frame { position:relative; aspect-ratio:124/268; max-height:58vh; border-radius:var(--r-md); overflow:hidden;
            background:rgba(255,255,255,0.03); border:1px dashed var(--line); display:flex; align-items:center; justify-content:center; }
        .pslot.filled .pslot-frame { border-style:solid; border-color:var(--gold-line); }
        .pslot-empty { font-size:12px; color:var(--muted); }
        .pslot.filled .pslot-empty { display:none; }
        .pslot-frame img { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; opacity:0; transition:opacity .3s; }
        .pslot.filled .pslot-frame img { opacity:1; }
        .pdl { padding:9px 12px; border-radius:var(--r-sm); cursor:pointer; border:1px solid var(--coral-3);
            background:linear-gradient(180deg,var(--coral),var(--coral-2)); color:#fff; font-family:"Inter",sans-serif; font-size:12px; font-weight:600;
            text-shadow:0 1px 1px rgba(120,50,25,.35); transition:transform .16s, box-shadow .18s; box-shadow:0 6px 14px -6px rgba(232,129,79,.5); }
        .pdl:hover { transform:translateY(-1px); }
        .preview-panel > .btn-outline { width:100%; margin-top:4px; }

        /* results (hidden fallback list) */
        .results-section { margin-top:16px; }
        .download-list { display:flex; flex-direction:column; gap:8px; }
        .preview-list { display:none; }

        /* ==== mapping editor ==== */
        .mapping-editor-section { display:none; margin-top:14px; padding:22px; background:var(--card-2); border:1px solid var(--line); border-radius:var(--r-lg); }
        .mapping-editor-section h3 { font-family:"Lora",Georgia,serif; font-size:1rem; color:var(--ink); margin-bottom:6px; }
        .mapping-editor-note { font-size:12.5px; color:var(--muted); margin-bottom:14px; line-height:1.55; }
        .mapping-editor-tabs { display:flex; gap:8px; margin-bottom:12px; }
        .mapping-tab { padding:8px 18px; border-radius:999px; cursor:pointer; border:1px solid var(--line); background:rgba(255,255,255,0.05);
            font-size:12.5px; font-weight:600; color:var(--muted); font-family:"Inter",sans-serif; transition:all .16s; }
        .mapping-tab:hover { color:var(--gold-2); border-color:var(--gold-line); }
        .mapping-tab.active { background:linear-gradient(180deg,var(--gold),var(--coral-2)); color:#20160a; border-color:var(--gold); }
        .mapping-editor-table-wrap { max-height:300px; overflow:auto; border:1px solid var(--line); border-radius:var(--r-sm); background:rgba(0,0,0,0.2); }
        .mapping-editor-table { width:100%; border-collapse:collapse; font-size:12.5px; }
        .mapping-editor-table th, .mapping-editor-table td { padding:10px 11px; border-bottom:1px solid var(--line-2); text-align:left; }
        .mapping-editor-table tr:last-child td { border-bottom:none; }
        .mapping-editor-table th { background:rgba(255,255,255,0.04); font-size:9.5px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); position:sticky; top:0; }
        .mapping-editor-table input { width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:7px; font-size:12.5px;
            font-family:"Inter",sans-serif; color:var(--ink); background:rgba(255,255,255,0.05); transition:border-color .16s, box-shadow .16s; }
        .mapping-editor-table input:focus { outline:none; border-color:var(--gold); box-shadow:0 0 0 3px rgba(240,180,95,.14); }
        .mapping-row-delete { padding:6px 11px; border-radius:7px; cursor:pointer; background:transparent; color:var(--danger); border:1px solid rgba(224,122,122,.3); font-size:11.5px; font-weight:600; transition:all .16s; }
        .mapping-row-delete:hover { background:var(--danger); color:#fff; border-color:var(--danger); }
        .mapping-editor-actions { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
        .btn-secondary { padding:10px 14px; border-radius:var(--r-sm); cursor:pointer; background:rgba(255,255,255,0.05); color:var(--ink-soft); border:1px solid var(--line);
            font-size:12.5px; font-weight:600; font-family:"Inter",sans-serif; transition:all .16s; }
        .btn-secondary:hover { border-color:var(--gold-line); color:var(--gold-2); }
        .btn-primary { background:linear-gradient(180deg,var(--coral),var(--coral-2)); color:#fff; border-color:var(--coral-3); }
        .btn-success { background:var(--gold); color:#20160a; border-color:var(--gold); }

        .header { display:none; }
        @keyframes rise { from{ opacity:0; transform:translateY(16px);} to{ opacity:1; transform:none; } }
        @media (prefers-reduced-motion:reduce){ .hero,.workspace,.preview-panel{ animation:none !important; } }

    </style>
</head>
<body>
    <canvas id="bgfx" aria-hidden="true"></canvas>

    <div class="app">
        <header class="hero">
            <div class="hero-eyebrow">Store Analytics</div>
            <h1>每周一<em>好评</em></h1>
            <p>上传门店数据，生成抖音与美团好评统计图</p>
        </header>

        <div class="layout">
        <div class="workspace">
        <main class="main-content">
            <section class="panel date-input-section">
                <div class="panel-head">
                    <div>
                        <div class="panel-title">统计周期</div>
                        <div class="panel-sub">自动填入本周一至今天，可手动修改</div>
                    </div>
                </div>
                <div class="date-row">
                    <div class="date-field year-field">
                        <label>年份</label>
                        <input type="text" class="date-input" id="yearInput" placeholder="2026">
                    </div>
                    <div class="date-field">
                        <label>起始月</label>
                        <input type="text" class="date-input" id="startMonthInput" placeholder="07">
                    </div>
                    <div class="date-field">
                        <label>起始日</label>
                        <input type="text" class="date-input" id="startDayInput" placeholder="06">
                    </div>
                    <span class="date-sep">—</span>
                    <div class="date-field">
                        <label>结束月</label>
                        <input type="text" class="date-input" id="endMonthInput" placeholder="07">
                    </div>
                    <div class="date-field">
                        <label>结束日</label>
                        <input type="text" class="date-input" id="endDayInput" placeholder="06">
                    </div>
                </div>
            </section>

            <div class="section-divider"></div>
            <div class="upload-section">
                <div id="fileMapping" class="file-mapping">
                    <div class="platform-grid file-mapping-grid">
                        <article class="platform-card mapping-item" id="mapping-2">
                            <div class="platform-top">
                                <div class="platform-brand mapping-info">
                                    <div class="platform-tag">Douyin</div>
                                    <div class="mapping-title">抖音好评</div>
                                    <div class="mapping-filename" id="file-2-name">未选择表格</div>
                                </div>
                                <div class="mapping-status missing" id="file-2-status">待上传</div>
                            </div>
                            <input type="file" id="douyinExcelInput" accept=".xlsx,.xls" hidden>
                            <div class="platform-actions mapping-actions">
                                <button type="button" class="btn btn-ghost btn-sm" onclick="document.getElementById('douyinExcelInput').click()">选择表格</button>
                                <button type="button" class="btn btn-clay btn-sm" onclick="generateDouyinImage()">生成图片</button>
                            </div>
                        </article>

                        <article class="platform-card mapping-item" id="mapping-4">
                            <div class="platform-top">
                                <div class="platform-brand mapping-info">
                                    <div class="platform-tag">Meituan</div>
                                    <div class="mapping-title">美团好评</div>
                                    <div class="mapping-filename" id="file-4-name">未选择表格</div>
                                </div>
                                <div class="mapping-status missing" id="file-4-status">待上传</div>
                            </div>
                            <input type="file" id="meituanExcelInput" accept=".xlsx,.xls" hidden>
                            <div class="platform-actions mapping-actions">
                                <button type="button" class="btn btn-ghost btn-sm" onclick="document.getElementById('meituanExcelInput').click()">选择表格</button>
                                <button type="button" class="btn btn-clay btn-sm" onclick="generateMeituanImage()">生成图片</button>
                            </div>
                        </article>
                    </div>

                    <div class="settings-card mapping-item found" id="mapping-5">
                        <div class="settings-left mapping-info">
                            <div class="settings-icon">🗂</div>
                            <div>
                                <div class="mapping-title">团购门店名对应表</div>
                                <div class="mapping-filename" id="file-5-name">已内置（美团42条 + 抖音43条）</div>
                            </div>
                        </div>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <button type="button" class="mapping-edit-btn" onclick="toggleMappingEditor()">编辑对应关系</button>
                            <div class="mapping-status found" id="file-5-status">内置</div>
                        </div>
                    </div>

                    <div id="mappingEditorSection" class="mapping-editor-section">
                        <h3>编辑门店名对应表</h3>
                        <p class="mapping-editor-note">修改后点击「保存」，数据保存在本浏览器本地，下次打开仍然有效。</p>
                        <div class="mapping-editor-tabs">
                            <button type="button" class="mapping-tab active" data-platform="美团" onclick="switchMappingTab('美团')">美团</button>
                            <button type="button" class="mapping-tab" data-platform="抖音" onclick="switchMappingTab('抖音')">抖音</button>
                        </div>
                        <div class="mapping-editor-table-wrap">
                            <table class="mapping-editor-table">
                                <thead>
                                    <tr>
                                        <th style="width:48%">平台门店名称</th>
                                        <th style="width:38%">实际店铺名称</th>
                                        <th style="width:14%">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="mappingEditorBody"></tbody>
                            </table>
                        </div>
                        <div class="mapping-editor-actions">

        function buildStoreMapping(rows) {
            const mapping = {};
            for (const [originalName, mappedName] of rows) {
                mapping[originalName] = mappedName;
            }
            return mapping;
        }

        const STORE_MAPPING_STORAGE_KEY = 'monday-store-mapping-v1';
        let storeMappingData = null;
        let activeMappingPlatform = '美团';

        function cloneStoreMapping(data) {
            return {
                '美团': data['美团'].map(row => [...row]),
                '抖音': data['抖音'].map(row => [...row])
            };
        }

        function loadStoreMapping() {
            try {
                const saved = localStorage.getItem(STORE_MAPPING_STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed['美团']) && Array.isArray(parsed['抖音'])) {
                        return parsed;
                    }
                }
            } catch (error) {
                console.warn('读取本地门店对应表失败，将使用默认数据', error);
            }
            return cloneStoreMapping(BUILTIN_STORE_MAPPING);
        }

        function isMappingCustomized() {
            return localStorage.getItem(STORE_MAPPING_STORAGE_KEY) !== null;
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function toggleMappingEditor() {
            const section = document.getElementById('mappingEditorSection');
            const opening = section.style.display === 'none' || !section.style.display;
            section.style.display = opening ? 'block' : 'none';
            if (opening) {
                renderMappingEditor();
            }
        }

        function switchMappingTab(platform) {
            if (activeMappingPlatform !== platform) {
                collectMappingFromEditor();
                activeMappingPlatform = platform;
            }
            document.querySelectorAll('.mapping-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.platform === platform);
            });
            renderMappingEditor();
        }

        function renderMappingEditor() {
            const tbody = document.getElementById('mappingEditorBody');
            const rows = storeMappingData[activeMappingPlatform];
            tbody.innerHTML = rows.map((row, index) => `
                <tr>
                    <td><input type="text" value="${escapeHtml(row[0] || '')}" data-index="${index}" data-col="0"></td>
                    <td><input type="text" value="${escapeHtml(row[1] || '')}" data-index="${index}" data-col="1"></td>
                    <td><button type="button" class="mapping-row-delete" onclick="deleteMappingRow(${index})">删除</button></td>
                </tr>
            `).join('');
        }

        function collectMappingFromEditor() {
            const rows = [];
            document.querySelectorAll('#mappingEditorBody tr').forEach(tr => {
                const inputs = tr.querySelectorAll('input');
                const originalName = inputs[0].value.trim();
                const mappedName = inputs[1].value.trim();
                if (originalName || mappedName) {
                    rows.push([originalName, mappedName]);
                }
            });
            storeMappingData[activeMappingPlatform] = rows;
        }

        // 读取Excel文件
        function readExcelFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        resolve(workbook);
                    } catch (error) {
                        log(`读取文件 ${file.name} 时出错: ${error.message}`, 'error');
                        reject(error);
                    }
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        // 获取工作表数据
        function getSheetData(workbook, sheetName = null) {
            const sheet = sheetName ? workbook.Sheets[sheetName] : workbook.Sheets[workbook.SheetNames[0]];
            const range = XLSX.utils.decode_range(sheet['!ref']);
            const data = [];
            for (let row = range.s.r; row <= range.e.r; row++) {
                const rowData = [];
                for (let col = range.s.c; col <= range.e.c; col++) {
                    const cellAddress = XLSX.utils.encode_cell({r: row, c: col});
                    const cell = sheet[cellAddress];
                    rowData.push(cell ? cell.v : '');
                }
                data.push(rowData);
            }
            return data;
        }

        // 创建图片画布
        function createImageCanvas(imageSource) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                let objectUrl = null;
                img.onload = function() {
                    if (objectUrl) URL.revokeObjectURL(objectUrl);
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    resolve({ canvas, ctx, width: img.width, height: img.height });
                };
                img.onerror = reject;
                if (imageSource instanceof File || imageSource instanceof Blob) {
                    objectUrl = URL.createObjectURL(imageSource);
                    img.src = objectUrl;
                } else {
                    img.src = imageSource;
                }
            });
        }

        // 绘制文字到画布
        function drawText(ctx, text, x, y, fontSize = 40, color = '#8B4513', fontFamily = 'Arial') {
            ctx.font = `${fontSize}px ${fontFamily}`;
            ctx.fillStyle = color;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(text, x, y);
        }

            const rankTextWidth = ctx.measureText('排名').width;
            const countTextWidth = ctx.measureText('增长数量').width;
            drawText(ctx, '排名', startX + (rankWidth - rankTextWidth) / 2, y, fontSize, '#8B4513');
            drawText(ctx, '门店', 505, y, fontSize, '#8B4513');
            drawText(ctx, '增长数量', 825 + (countWidth - countTextWidth) / 2, y, fontSize, '#8B4513');
            y += rowHeight;
            
            // 绘制前7个门店
            for (let i = 0; i < Math.min(7, sortedStores.length); i++) {
                const [store, count] = sortedStores[i];
                const rank = (i >= 3) ? String(i + 1) : '';
                const countText = `${count}个`;
                
                const rankNumWidth = ctx.measureText(rank).width;
                const countNumWidth = ctx.measureText(countText).width;
                drawText(ctx, rank, startX + (rankWidth - rankNumWidth) / 2, y, fontSize, '#8B4513');
                drawText(ctx, store, 505, y, fontSize, '#8B4513');
                drawText(ctx, countText, 825 + (countWidth - countNumWidth) / 2, y, fontSize, '#8B4513');
                y += rowHeight;
            }
            
            // 绘制后7个门店
            y += 210;
            const rankTextWidth2 = ctx.measureText('排名').width;
            const countTextWidth2 = ctx.measureText('增长数量').width;
            drawText(ctx, '排名', startX + (rankWidth - rankTextWidth2) / 2, y, fontSize, '#000000');
            drawText(ctx, '门店', 505, y, fontSize, '#000000');
            drawText(ctx, '增长数量', 825 + (countWidth - countTextWidth2) / 2, y, fontSize, '#000000');
            y += rowHeight;
            
            const startIndex = Math.max(0, sortedStores.length - 7);
            for (let i = startIndex; i < sortedStores.length; i++) {
                const [store, count] = sortedStores[i];
                const rank = String(i + 1);
                const countText = `${count}个`;
                
                const rankNumWidth2 = ctx.measureText(rank).width;
                const countNumWidth2 = ctx.measureText(countText).width;
                drawText(ctx, rank, startX + (rankWidth - rankNumWidth2) / 2, y, fontSize, '#000000');
                drawText(ctx, store, 505, y, fontSize, '#000000');
                drawText(ctx, countText, 825 + (countWidth - countNumWidth2) / 2, y, fontSize, '#000000');
                y += rowHeight;
            }
        }

        // 处理抖音数据
        async function processDouyinData(year, startMonth, startDay, endMonth, endDay) {
            log('处理抖音好评数据...', 'info');
            
            // 读取Excel数据
            const douyinWorkbook = await readExcelFile(uploadedFiles['douyinExcel']);
            const douyinMapping = buildStoreMapping(storeMappingData['抖音']);
            // 读取抖音数据
            const douyinData = getSheetData(douyinWorkbook);
            const storeCounts = {};
            
            for (let i = 1; i < douyinData.length; i++) {
                const storeName = douyinData[i][0]; // 假设第一列是门店名称
                if (storeName) {
                    const mappedName = douyinMapping[String(storeName).trim()] || String(storeName).trim();
                    storeCounts[mappedName] = (storeCounts[mappedName] || 0) + 1;
                }
            }
            
            log(`抖音数据统计完成，共 ${Object.keys(storeCounts).length} 个门店`, 'success');
            
            // 处理图片
            const { canvas, ctx } = await createImageCanvas(getImageSource('douyinImage'));
            
            // 格式化月份为双位数
            const formattedStartMonth = String(startMonth).padStart(2, '0');
            const formattedEndMonth = String(endMonth).padStart(2, '0');
            
            // 绘制标题和日期
            drawText(ctx, year, 80, 295, 100, '#8B4513');
            const yearWidth = ctx.measureText(year).width;
            drawText(ctx, formattedStartMonth, 80 + yearWidth + 140, 295, 100, '#8B4513');
            
            // 绘制日期数字行
            drawText(ctx, formattedStartMonth, 300, 630, 60, '#8B4513');
            drawText(ctx, startDay, 325 + 110, 630, 60, '#8B4513');
            drawText(ctx, formattedEndMonth, 300 + 310, 630, 60, '#8B4513');
            drawText(ctx, endDay, 340 + 405, 630, 60, '#8B4513');
            
            // 绘制表格
            drawTable(ctx, storeCounts, 275, 900, 40);
            
            // 转换为Blob
            return new Promise(resolve => {
                canvas.toBlob(resolve, 'image/jpeg', 0.9);
            });
        }

        // 添加下载项到结果列表
        function addDownloadItem(filename, blob) {
            processedFiles[filename] = blob;
            const k = filename.indexOf('抖音') >= 0 ? 'douyin' : 'meituan';
            const slot = document.getElementById('pslot-'+k);
            const img = document.getElementById('pimg-'+k);
            const dl = document.getElementById('pdl-'+k);
            if (img) { const url = URL.createObjectURL(blob); img.onload = () => URL.revokeObjectURL(url); img.src = url; }
            if (slot) slot.classList.add('filled');
            if (dl) { dl.style.display = ''; dl.onclick = () => downloadFile(filename); }
        }
        function resetPreviewSlots() {
            ['douyin','meituan'].forEach(k => {
                const slot = document.getElementById('pslot-'+k);
                const img = document.getElementById('pimg-'+k);
                const dl = document.getElementById('pdl-'+k);
                if (slot) slot.classList.remove('filled');
                if (img) img.removeAttribute('src');
                if (dl) { dl.style.display = 'none'; dl.onclick = null; }
            });
        }

        // 下载单个文件
        function downloadFile(filename) {
            const blob = processedFiles[filename];
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function getImageSource(imageKey) {
            return uploadedFiles[imageKey] || BUILTIN_IMAGE_URLS[imageKey];
        }

        function showResultsSection() {
            const b = document.getElementById('downloadAllBtn');
            if (b) b.style.display = 'inline-flex';
        }

        async function generateDouyinImage() {
            const dates = getDateInputs();
            if (!dates) return;
            if (!uploadedFiles['douyinExcel']) {
                alert('请先上传抖音好评表格');
                return;
            }

            showProgress();
            log('🚀 开始生成抖音图片...', 'info');
            try {
                updateProgress(50, '处理抖音数据...');
                const douyinBlob = await processDouyinData(dates.year, dates.startMonth, dates.startDay, dates.endMonth, dates.endDay);
                addDownloadItem('抖音好评_标注.jpg', douyinBlob);
                updateProgress(100, '抖音图片生成完成！');
                log('✅ 抖音图片已生成', 'success');
                showResultsSection();
                hideProgress();
            } catch (error) {
                log(`❌ 抖音图片生成失败: ${error.message}`, 'error');
                console.error('抖音处理错误:', error);
                hideProgress();
            }
        }

            const dates = getDateInputs();

        // 主要处理函数
        async function processData() {
            const dates = getDateInputs();
            if (!dates) return;

            const hasDouyin = !!uploadedFiles['douyinExcel'];
            const hasMeituan = !!uploadedFiles['meituanExcel'];
            if (!hasDouyin && !hasMeituan) {
                alert('请至少上传一个表格');
                return;
            }
            
            showProgress();
            log('🚀 开始处理数据...', 'info');
            // Clear previous results/previews
            resetPreviewSlots();
            
            try {
                let generated = 0;
                if (hasDouyin) {
                    updateProgress(hasMeituan ? 20 : 50, '处理抖音数据...');
                    const douyinBlob = await processDouyinData(dates.year, dates.startMonth, dates.startDay, dates.endMonth, dates.endDay);
                    addDownloadItem('抖音好评_标注.jpg', douyinBlob);
                    generated += 1;
                }

                if (hasMeituan) {
                    updateProgress(hasDouyin ? 80 : 50, '处理美团数据...');
                    const meituanBlob = await processMeituanData(dates.year, dates.startMonth, dates.startDay, dates.endMonth, dates.endDay);
                    addDownloadItem('美团好评_标注.jpg', meituanBlob);
                    generated += 1;
                }
                
                updateProgress(100, '处理完成！');
                log(`✅ 已生成 ${generated} 张图片`, 'success');
                
                showResultsSection();
                hideProgress();
                
            } catch (error) {
                log(`❌ 处理过程中出现错误: ${error.message}`, 'error');
                console.error('处理错误:', error);
                hideProgress();
            }
        }

        // 下载全部文件为ZIP压缩包
        async function downloadAllAsZip() {
            if (Object.keys(processedFiles).length === 0) {
                alert('没有可下载的文件！');
                return;
            }

            log('📦 开始创建ZIP压缩包...', 'info');
            
            try {
                const zip = new JSZip();
                const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
                
                for (const [filename, blob] of Object.entries(processedFiles)) {
                    zip.file(filename, blob);
                    log(`📁 添加文件到压缩包: ${filename}`, 'info');
                }
                
                log('📦 正在生成ZIP文件...', 'info');
                const zipBlob = await zip.generateAsync({type: 'blob'});
                
                const url = URL.createObjectURL(zipBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `每周一好评数统计结果_${timestamp}.zip`;
                a.click();
                
                URL.revokeObjectURL(url);
                
                log('✅ ZIP压缩包下载完成！', 'success');
                log(`📦 文件包含 ${Object.keys(processedFiles).length} 个图片文件`, 'info');
                
            } catch (error) {
                log(`❌ 创建ZIP文件失败: ${error.message}`, 'error');
                console.error('ZIP创建错误:', error);
            }
        }

        function initDateFields() {
            const today = new Date();
            const day = today.getDay();
            const diffToMonday = day === 0 ? -6 : 1 - day;
            const startDate = new Date(today);
            startDate.setDate(today.getDate() + diffToMonday);

            document.getElementById('yearInput').value = today.getFullYear();
            document.getElementById('startMonthInput').value = String(startDate.getMonth() + 1).padStart(2, '0');
            document.getElementById('startDayInput').value = String(startDate.getDate()).padStart(2, '0');
            document.getElementById('endMonthInput').value = String(today.getMonth() + 1).padStart(2, '0');
            document.getElementById('endDayInput').value = String(today.getDate()).padStart(2, '0');
        }

        // 页面加载完成后的初始化

        function initParallax() {
            const orbs = document.getElementById('sceneOrbs');
            const floor = document.getElementById('sceneFloor');
            const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const fine = window.matchMedia('(pointer: fine)').matches;

            if (!reduce && fine) {
                window.addEventListener('mousemove', (e) => {
                    const x = (e.clientX / window.innerWidth - 0.5) * 2;
                    const y = (e.clientY / window.innerHeight - 0.5) * 2;
                    if (orbs) orbs.style.transform = `translate3d(${x * 28}px, ${y * 22}px, 0)`;
                    if (floor) floor.style.transform = `translate3d(${x * 16}px, 0, 0)`;
                });

                // 平台卡片 3D 倾斜跟随
                document.querySelectorAll('.platform-card').forEach((card) => {
                    card.addEventListener('mousemove', (e) => {
                        const r = card.getBoundingClientRect();
                        const px = (e.clientX - r.left) / r.width - 0.5;
                        const py = (e.clientY - r.top) / r.height - 0.5;
                        card.style.transform = `perspective(760px) rotateX(${(-py * 5).toFixed(2)}deg) rotateY(${(px * 6).toFixed(2)}deg) translateY(-3px)`;
                    });
                    card.addEventListener('mouseleave', () => { card.style.transform = ''; });
                });
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            storeMappingData = loadStoreMapping();
            initDateFields();
            setBuiltinMappingStatus();
            document.getElementById('fileMapping').style.display = 'block';
            initParallax();
        });
    </script>

    <script type="module">
    import * as THREE from 'three';
    const cv=document.getElementById('bgfx');
    if(cv){ try{
      const r=new THREE.WebGLRenderer({canvas:cv,alpha:true,antialias:true});
      r.setPixelRatio(Math.min(devicePixelRatio,2)); r.setClearColor(0x000000,0);
      const sc=new THREE.Scene(); let asp=innerWidth/innerHeight;
      const cam=new THREE.OrthographicCamera(-asp,asp,1,-1,0.1,10); cam.position.z=2;
      const N=360, pos=new Float32Array(N*3), col=new Float32Array(N*3), sz=new Float32Array(N), sd=new Float32Array(N), sp=new Float32Array(N);
      const pal=[new THREE.Color('#ffd98a'),new THREE.Color('#f0a35a'),new THREE.Color('#6fb7ff'),new THREE.Color('#c85a86')];
      const rnd=(a,b)=>a+Math.random()*(b-a);
      for(let i=0;i<N;i++){ pos[i*3]=rnd(-asp,asp); pos[i*3+1]=rnd(-1.1,1.2); pos[i*3+2]=0;
        const c=pal[(Math.random()*pal.length)|0]; col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
        sz[i]=rnd(1,3); sd[i]=rnd(0,99); sp[i]=rnd(0.006,0.03); }
      const g=new THREE.BufferGeometry();
      g.setAttribute('position',new THREE.BufferAttribute(pos,3));
      g.setAttribute('color',new THREE.BufferAttribute(col,3));
      g.setAttribute('psize',new THREE.BufferAttribute(sz,1));
      const S=64,tc=document.createElement('canvas'); tc.width=tc.height=S; const tg=tc.getContext('2d');
      const gr=tg.createRadialGradient(S/2,S/2,0,S/2,S/2,S/2);
      gr.addColorStop(0,'rgba(255,255,255,1)'); gr.addColorStop(.35,'rgba(255,255,255,.5)'); gr.addColorStop(1,'rgba(255,255,255,0)');
      tg.fillStyle=gr; tg.fillRect(0,0,S,S); const tex=new THREE.CanvasTexture(tc);
      const m=new THREE.ShaderMaterial({uniforms:{uTex:{value:tex},uScale:{value:innerHeight/2}},
        vertexColors:true, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
        vertexShader:'attribute float psize; varying vec3 vC; uniform float uScale; void main(){ vC=color; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); gl_PointSize=psize*0.011*uScale; }',
        fragmentShader:'uniform sampler2D uTex; varying vec3 vC; void main(){ float a=texture2D(uTex,gl_PointCoord).a; gl_FragColor=vec4(vC,a*0.85); }'});
      const pts=new THREE.Points(g,m); sc.add(pts);
      const t0=performance.now();
      function loop(now){ const t=(now-t0)*0.001;
        for(let i=0;i<N;i++){ pos[i*3+1]+=sp[i]*0.016; if(pos[i*3+1]>1.25){ pos[i*3+1]=-1.25; pos[i*3]=rnd(-asp,asp); }
          pos[i*3]+=Math.sin(t*0.4+sd[i])*0.0005; }
        g.attributes.position.needsUpdate=true; r.render(sc,cam); requestAnimationFrame(loop); }
      requestAnimationFrame(loop);
      addEventListener('resize',()=>{ asp=innerWidth/innerHeight; cam.left=-asp; cam.right=asp; cam.updateProjectionMatrix();
        r.setSize(innerWidth,innerHeight); m.uniforms.uScale.value=innerHeight/2; });
      r.setSize(innerWidth,innerHeight);
    }catch(e){ console.warn('bgfx off', e); } }
    </script>
