<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每周一好评 - 网页版</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --canvas: #faf9f5;
            --glass: rgba(250, 249, 245, 0.78);
            --glass-border: rgba(255, 255, 255, 0.45);
            --glass-shadow: 0 32px 80px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255,255,255,0.08) inset;
            --ink: #141413;
            --ink-soft: #3d3d3a;
            --muted: #8a8880;
            --clay: #d97757;
            --clay-hover: #c4684a;
            --clay-glow: rgba(217, 119, 87, 0.45);
            --dark-card: rgba(24, 23, 21, 0.82);
            --dark-border: rgba(255, 255, 255, 0.08);
            --ok: #6ecf98;
            --ok-bg: rgba(110, 207, 152, 0.12);
            --warn: #e8b86d;
            --warn-bg: rgba(232, 184, 109, 0.12);
            --r-xl: 24px;
            --r-lg: 18px;
            --r-md: 12px;
            --r-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: "Inter", -apple-system, sans-serif;
            color: var(--ink-soft);
            background: #080706;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ═══ 3D 背景场景 ═══ */
        .bg-scene {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            background:
                radial-gradient(ellipse 90% 70% at 50% -10%, rgba(217, 119, 87, 0.22), transparent 55%),
                radial-gradient(ellipse 60% 50% at 100% 50%, rgba(217, 119, 87, 0.08), transparent 50%),
                radial-gradient(ellipse 50% 40% at 0% 80%, rgba(255, 200, 150, 0.06), transparent 45%),
                linear-gradient(180deg, #121010 0%, #080706 45%, #0a0908 100%);
        }

        .bg-orbs { position: absolute; inset: 0; pointer-events: none; }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            will-change: transform;
        }
        .orb-1 {
            width: 520px; height: 520px;
            background: radial-gradient(circle, rgba(217, 119, 87, 0.55) 0%, transparent 70%);
            top: -12%; left: 50%;
            transform: translateX(-50%);
            animation: orbPulse 8s ease-in-out infinite;
        }
        .orb-2 {
            width: 340px; height: 340px;
            background: radial-gradient(circle, rgba(255, 180, 120, 0.25) 0%, transparent 70%);
            bottom: 15%; right: -5%;
            animation: orbPulse 11s ease-in-out infinite reverse;
        }
        .orb-3 {
            width: 280px; height: 280px;
            background: radial-gradient(circle, rgba(200, 160, 100, 0.2) 0%, transparent 70%);
            bottom: 25%; left: -8%;
            animation: orbPulse 9s ease-in-out infinite 2s;
        }
        @keyframes orbPulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.08); }
        }

        .bg-grid-wrap {
            position: absolute;
            bottom: -5%;
            left: -30%;
            right: -30%;
            height: 55%;
            perspective: 900px;
            transform-style: preserve-3d;
            transition: transform 0.4s ease-out;
        }
        .bg-grid-3d {
            width: 100%;
            height: 100%;
            background:
                linear-gradient(rgba(217, 119, 87, 0.18) 1px, transparent 1px),
                linear-gradient(90deg, rgba(217, 119, 87, 0.18) 1px, transparent 1px);
            background-size: 56px 56px;
            transform: rotateX(74deg);
            transform-origin: center top;
            mask-image: linear-gradient(to top, black 15%, transparent 85%);
            animation: gridScroll 20s linear infinite;
        }
        @keyframes gridScroll {
            from { background-position: 0 0; }
            to { background-position: 0 56px; }
        }

        .bg-shapes {
            position: absolute;
            inset: 0;
            pointer-events: none;
            transition: transform 0.5s ease-out;
        }
        .shape {
            position: absolute;
            border: 1px solid rgba(217, 119, 87, 0.25);
            will-change: transform;
        }
        .shape-ring {
            width: 180px; height: 180px;
            border-radius: 50%;
            top: 18%; right: 8%;
            box-shadow: 0 0 60px rgba(217, 119, 87, 0.15), inset 0 0 40px rgba(217, 119, 87, 0.05);
            animation: floatShape 14s ease-in-out infinite;
        }
        .shape-ring::after {
            content: "";
            position: absolute;
            inset: 24px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .shape-cube {
            width: 90px; height: 90px;
            top: 55%; left: 6%;
            background: linear-gradient(135deg, rgba(217,119,87,0.12), rgba(255,255,255,0.03));
            transform: rotate(45deg) rotateX(20deg);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: floatShape 18s ease-in-out infinite -4s;
        }
        .shape-sphere {
            width: 120px; height: 120px;
            border-radius: 50%;
            top: 30%; left: 12%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12), rgba(217,119,87,0.08) 50%, transparent 70%);
            box-shadow: 0 0 80px rgba(217, 119, 87, 0.2);
            animation: floatShape 16s ease-in-out infinite -7s;
        }
        @keyframes floatShape {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-24px) rotate(6deg); }
            66% { transform: translateY(12px) rotate(-4deg); }
        }
        .shape-cube { animation-name: floatCube; }
        @keyframes floatCube {
            0%, 100% { transform: rotate(45deg) rotateX(20deg) translateY(0); }
            50% { transform: rotate(50deg) rotateX(28deg) translateY(-20px); }
        }

        .bg-vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 60% at 50% 40%, transparent 30%, rgba(8,7,6,0.7) 100%);
            pointer-events: none;
        }

        /* ═══ 主布局 ═══ */
        .app {
            position: relative;
            z-index: 1;
            max-width: 880px;
            margin: 0 auto;
            padding: 56px 20px 80px;
        }

        .hero {
            text-align: center;
            margin-bottom: 36px;
        }
        .hero-eyebrow {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(250, 249, 245, 0.45);
            margin-bottom: 18px;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 999px;
            backdrop-filter: blur(8px);
        }
        .hero h1 {
            font-family: "Lora", Georgia, serif;
            font-size: clamp(2.5rem, 7vw, 3.75rem);
            font-weight: 500;
            color: var(--canvas);
            letter-spacing: -0.03em;
            line-height: 1.08;
            text-shadow: 0 4px 60px rgba(217, 119, 87, 0.35);
        }
        .hero p {
            margin-top: 14px;
            font-family: "Lora", Georgia, serif;
            font-size: 1rem;
            color: rgba(250, 249, 245, 0.5);
            line-height: 1.6;
        }

        .workspace {
            background: var(--glass);
            backdrop-filter: blur(28px) saturate(1.5);
            -webkit-backdrop-filter: blur(28px) saturate(1.5);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-xl);
            box-shadow: var(--glass-shadow);
            padding: 28px;
            transform: translateZ(0);
        }

        /* ═══ 日期区 ═══ */
        .panel { margin-bottom: 20px; }
        .panel-head { margin-bottom: 16px; }
        .panel-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .panel-sub {
            font-family: "Lora", Georgia, serif;
            font-size: 0.9rem;
            color: var(--ink-soft);
            margin-top: 4px;
        }
        .date-row {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 8px;
        }
        .date-field { flex: 1; min-width: 64px; }
        .date-field.year-field { flex: 1.2; min-width: 80px; }
        .date-field label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 5px;
        }
        .date-input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid rgba(20, 20, 19, 0.12);
            border-radius: var(--r-sm);
            background: rgba(255, 255, 255, 0.65);
            font-family: "Inter", sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--ink);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .date-input:focus {
            outline: none;
            border-color: var(--clay);
            box-shadow: 0 0 0 3px rgba(217, 119, 87, 0.2);
        }
        .date-sep {
            color: var(--muted);
            padding-bottom: 11px;
            opacity: 0.5;
        }

        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(20,20,19,0.1), transparent);
            margin: 24px 0;
        }

        /* ═══ 平台卡片 ═══ */
        .platform-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }
        @media (max-width: 620px) { .platform-grid { grid-template-columns: 1fr; } }

        .platform-card {
            position: relative;
            padding: 22px;
            border-radius: var(--r-lg);
            background: var(--dark-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--dark-border);
            display: flex;
            flex-direction: column;
            gap: 18px;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .platform-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--clay), transparent);
            opacity: 0.6;
        }
        .platform-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.35), 0 0 0 1px rgba(217,119,87,0.15);
        }
        .platform-card.found {
            box-shadow: 0 0 0 1px rgba(110, 207, 152, 0.25), 0 16px 40px rgba(0,0,0,0.3);
        }
        .platform-card.found::before {
            background: linear-gradient(90deg, transparent, var(--ok), transparent);
        }

        .platform-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }
        .platform-tag {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(250, 249, 245, 0.35);
            margin-bottom: 6px;
        }
        .mapping-title {
            font-family: "Lora", Georgia, serif;
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--canvas);
            line-height: 1.2;
        }
        .settings-card .mapping-title { color: var(--ink); }
        .mapping-filename {
            font-size: 12px;
            color: rgba(250, 249, 245, 0.4);
            margin-top: 4px;
            word-break: break-all;
        }
        .settings-card .mapping-filename { color: var(--muted); }

        .mapping-status {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.04em;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .mapping-status.found {
            background: var(--ok-bg);
            color: var(--ok);
            border: 1px solid rgba(110, 207, 152, 0.25);
        }
        .mapping-status.missing {
            background: rgba(255,255,255,0.05);
            color: rgba(250,249,245,0.45);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .settings-card .mapping-status.missing {
            background: var(--warn-bg);
            color: #b8860b;
            border-color: rgba(184, 134, 11, 0.2);
        }

        .platform-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        /* ═══ 按钮 ═══ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 11px 16px;
            border: none;
            border-radius: var(--r-sm);
            font-family: "Lora", Georgia, serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-ghost {
            background: rgba(255,255,255,0.07);
            color: rgba(250,249,245,0.85);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.12); }

        .btn-clay {
            background: linear-gradient(135deg, var(--clay), #b86548);
            color: #fff;
            box-shadow: 0 4px 20px var(--clay-glow);
        }
        .btn-clay:hover {
            box-shadow: 0 8px 32px var(--clay-glow);
            transform: translateY(-1px);
        }

        .btn-outline {
            background: rgba(255,255,255,0.5);
            color: var(--ink-soft);
            border: 1px solid rgba(20,20,19,0.15);
        }
        .btn-outline:hover { background: white; }

        .btn-sm { padding: 10px 12px; font-size: 12px; }

        /* ═══ 设置行 ═══ */
        .settings-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
            padding: 16px 20px;
            border-radius: var(--r-lg);
            background: rgba(255,255,255,0.45);
            border: 1px solid rgba(20,20,19,0.08);
            margin-bottom: 4px;
        }
        .settings-left { display: flex; align-items: center; gap: 12px; }
        .settings-icon {
            width: 38px; height: 38px;
            border-radius: var(--r-sm);
            background: rgba(217,119,87,0.12);
            border: 1px solid rgba(217,119,87,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }
        .mapping-edit-btn {
            padding: 8px 14px;
            background: white;
            color: var(--ink-soft);
            border: 1px solid rgba(20,20,19,0.12);
            border-radius: var(--r-sm);
            cursor: pointer;
            font-family: "Inter", sans-serif;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.15s;
        }
        .mapping-edit-btn:hover { border-color: var(--clay); color: var(--clay); }

        /* ═══ 底部操作 ═══ */
        .action-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(20,20,19,0.08);
        }
        .action-bar .btn-clay { flex: 1; min-width: 140px; padding: 14px 24px; font-size: 14px; }

        /* ═══ 进度 & 结果 ═══ */
        .progress-section {
            display: none;
            margin-top: 16px;
            padding: 18px 20px;
            background: rgba(255,255,255,0.4);
            border-radius: var(--r-md);
            border: 1px solid rgba(20,20,19,0.08);
        }
        .progress-bar {
            height: 4px;
            background: rgba(20,20,19,0.08);
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--clay), #f0a080);
            width: 0%;
            transition: width 0.35s ease;
            border-radius: 999px;
            box-shadow: 0 0 12px var(--clay-glow);
        }
        .progress-text { font-size: 12px; color: var(--muted); }

        .results-section {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(20,20,19,0.08);
        }
        .results-section h3 {
            font-family: "Lora", Georgia, serif;
            font-size: 1rem;
            font-weight: 500;
            color: var(--ink);
            margin-bottom: 16px;
        }
        .preview-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin-bottom: 12px;
        }
        .preview-card {
            border-radius: var(--r-md);
            overflow: hidden;
            border: 1px solid rgba(20,20,19,0.1);
            background: white;
        }
        .preview-card img { width: 100%; display: block; }
        .preview-caption {
            padding: 8px 12px;
            font-size: 11px;
            color: var(--muted);
            border-top: 1px solid rgba(20,20,19,0.06);
        }
        .download-list { display: flex; flex-direction: column; gap: 8px; }
        .download-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 12px 14px;
            border-radius: var(--r-sm);
            background: rgba(255,255,255,0.55);
            border: 1px solid rgba(20,20,19,0.08);
            font-size: 13px;
        }
        .download-btn {
            padding: 7px 14px;
            background: var(--clay);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            font-family: "Inter", sans-serif;
        }
        .download-btn:hover { background: var(--clay-hover); }

        /* ═══ 编辑器 ═══ */
        .file-mapping { display: block; }
        .mapping-editor-section {
            display: none;
            margin-top: 14px;
            padding: 22px;
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(20,20,19,0.08);
            border-radius: var(--r-lg);
        }
        .mapping-editor-section h3 {
            font-family: "Lora", Georgia, serif;
            font-size: 0.95rem;
            color: var(--ink);
            margin-bottom: 6px;
        }
        .mapping-editor-note { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
        .mapping-editor-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
        .mapping-tab {
            padding: 7px 16px;
            border: 1px solid rgba(20,20,19,0.12);
            background: rgba(255,255,255,0.6);
            border-radius: 999px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            font-family: "Inter", sans-serif;
        }
        .mapping-tab.active { background: var(--ink); color: var(--canvas); border-color: var(--ink); }
        .mapping-editor-table-wrap {
            max-height: 280px;
            overflow: auto;
            border: 1px solid rgba(20,20,19,0.08);
            border-radius: var(--r-sm);
        }
        .mapping-editor-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .mapping-editor-table th, .mapping-editor-table td {
            padding: 9px 11px;
            border-bottom: 1px solid rgba(20,20,19,0.06);
            text-align: left;
        }
        .mapping-editor-table th {
            background: rgba(20,20,19,0.04);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            position: sticky;
            top: 0;
        }
        .mapping-editor-table input {
            width: 100%;
            padding: 7px 9px;
            border: 1px solid rgba(20,20,19,0.12);
            border-radius: 6px;
            font-size: 12px;
            background: white;
        }
        .mapping-editor-table input:focus {
            outline: none;
            border-color: var(--clay);
        }
        .mapping-row-delete {
            padding: 4px 9px;
            background: transparent;
            color: #c05050;
            border: 1px solid rgba(192,80,80,0.25);
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
        }
        .mapping-editor-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .btn-secondary {
            padding: 9px 14px;
            background: white;
            color: var(--ink-soft);
            border: 1px solid rgba(20,20,19,0.12);
            border-radius: var(--r-sm);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: "Inter", sans-serif;
        }
        .btn-primary { background: var(--clay); color: white; }
        .btn-primary:hover { background: var(--clay-hover); }
        .btn-success { background: var(--ink); color: var(--canvas); }

        .surface, .surface-dark, .glass { }
        .mapping-item, .upload-section, .date-input-section, .process-section, .main-content, .container { }
        .header { display: none; }
    </style>
</head>
<body>
    <div class="bg-scene" aria-hidden="true">
        <div class="bg-orbs">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
            <div class="orb orb-3"></div>
        </div>
        <div class="bg-grid-wrap" id="bgGridWrap">
            <div class="bg-grid-3d"></div>
        </div>
        <div class="bg-shapes" id="bgShapes">
            <div class="shape shape-ring"></div>
            <div class="shape shape-cube"></div>
            <div class="shape shape-sphere"></div>
        </div>
        <div class="bg-vignette"></div>
    </div>

    <div class="app">
        <header class="hero">
            <div class="hero-eyebrow">Store Analytics</div>
            <h1>每周一好评</h1>
            <p>上传门店数据，生成抖音与美团好评统计图</p>
        </header>

        <div class="workspace">
        <main class="main-content">
            <section class="panel date-input-section">

        function buildStoreMapping(rows) {
            const mapping = {};
            for (const [originalName, mappedName] of rows) {
                mapping[originalName] = mappedName;
            }
            return mapping;
        }

        const STORE_MAPPING_STORAGE_KEY = 'monday-store-mapping-v1';
        let storeMappingData = null;
        let activeMappingPlatform = '美团';

        function cloneStoreMapping(data) {
            return {
                '美团': data['美团'].map(row => [...row]),
                '抖音': data['抖音'].map(row => [...row])
            };
        }

        function loadStoreMapping() {
            try {
                const saved = localStorage.getItem(STORE_MAPPING_STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed['美团']) && Array.isArray(parsed['抖音'])) {
                        return parsed;
                    }
                }
            } catch (error) {
                console.warn('读取本地门店对应表失败，将使用默认数据', error);
            }
            return cloneStoreMapping(BUILTIN_STORE_MAPPING);
        }

        function isMappingCustomized() {
            return localStorage.getItem(STORE_MAPPING_STORAGE_KEY) !== null;
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function toggleMappingEditor() {
            const section = document.getElementById('mappingEditorSection');
            const opening = section.style.display === 'none' || !section.style.display;
            section.style.display = opening ? 'block' : 'none';
            if (opening) {
                renderMappingEditor();
            }
        }

        function switchMappingTab(platform) {
            if (activeMappingPlatform !== platform) {
                collectMappingFromEditor();
                activeMappingPlatform = platform;
            }
            document.querySelectorAll('.mapping-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.platform === platform);
            });
            renderMappingEditor();
        }

        function renderMappingEditor() {
            const tbody = document.getElementById('mappingEditorBody');
            const rows = storeMappingData[activeMappingPlatform];
            tbody.innerHTML = rows.map((row, index) => `
                <tr>
                    <td><input type="text" value="${escapeHtml(row[0] || '')}" data-index="${index}" data-col="0"></td>
                    <td><input type="text" value="${escapeHtml(row[1] || '')}" data-index="${index}" data-col="1"></td>
                    <td><button type="button" class="mapping-row-delete" onclick="deleteMappingRow(${index})">删除</button></td>
                </tr>
            `).join('');
        }

        function collectMappingFromEditor() {
            const rows = [];
            document.querySelectorAll('#mappingEditorBody tr').forEach(tr => {
                const inputs = tr.querySelectorAll('input');
                const originalName = inputs[0].value.trim();
                const mappedName = inputs[1].value.trim();
                if (originalName || mappedName) {
                    rows.push([originalName, mappedName]);
                }
            });
            storeMappingData[activeMappingPlatform] = rows;
        }

        function addMappingRow() {
            collectMappingFromEditor();
            storeMappingData[activeMappingPlatform].push(['', '']);
            renderMappingEditor();
            const inputs = document.querySelectorAll('#mappingEditorBody tr:last-child input');
            if (inputs[0]) inputs[0].focus();
        }

        function deleteMappingRow(index) {
            collectMappingFromEditor();
            storeMappingData[activeMappingPlatform].splice(index, 1);
            renderMappingEditor();
        }

        function saveMappingFromEditor() {
            collectMappingFromEditor();
            localStorage.setItem(STORE_MAPPING_STORAGE_KEY, JSON.stringify(storeMappingData));
            setBuiltinMappingStatus();
            log('✅ 团购门店名对应表已保存到浏览器本地', 'success');
        }

        function resetMappingToDefault() {
            if (!confirm('确定恢复为默认对应表吗？你在本地的修改将被清除。')) {
                return;
            }
            localStorage.removeItem(STORE_MAPPING_STORAGE_KEY);
            storeMappingData = cloneStoreMapping(BUILTIN_STORE_MAPPING);
            renderMappingEditor();
            setBuiltinMappingStatus();
            log('↩️ 团购门店名对应表已恢复为默认', 'info');
        }

        let fileNames = {
            '1': '抖音好评图片',
            '2': '抖音好评Excel',

        };

        // Excel 单独上传
        document.getElementById('douyinExcelInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) handleExcelUpload('douyin', file);
            e.target.value = '';
        });

        document.getElementById('meituanExcelInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) handleExcelUpload('meituan', file);
            e.target.value = '';
        });

        function handleExcelUpload(platform, file) {
            if (!/\.(xlsx|xls)$/i.test(file.name)) {
                alert('请选择 Excel 文件（.xlsx 或 .xls）');
                return;
            }
            const config = platform === 'douyin'
                ? { key: 'douyinExcel', num: '2', label: '抖音' }
                : { key: 'meituanExcel', num: '4', label: '美团' };
            uploadedFiles[config.key] = file;
            updateFileMapping(config.num, file.name);
            log(`✅ 已选择${config.label}表格: ${file.name}`, 'success');
        }

        function getDateInputs() {
            const year = document.getElementById('yearInput').value.trim();
            const startMonth = document.getElementById('startMonthInput').value.trim();
            const startDay = document.getElementById('startDayInput').value.trim();
            const endMonth = document.getElementById('endMonthInput').value.trim();
            const endDay = document.getElementById('endDayInput').value.trim();

            if (!year || !startMonth || !startDay || !endMonth || !endDay) {
                alert('请填写所有日期信息！');
                return null;
            }
            return { year, startMonth, startDay, endMonth, endDay };
        }

        function setBuiltinMappingStatus() {
            const customized = isMappingCustomized();
            document.getElementById('file-5-name').textContent = `${customized ? '已自定义' : '已内置'}（美团${storeMappingData['美团'].length}条 + 抖音${storeMappingData['抖音'].length}条）`;
            document.getElementById('file-5-status').textContent = customized ? '已保存' : '内置';

        function log() {}

        // 更新进度
        function updateProgress(percent, text) {
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = text;
        }

        // 显示进度条
        function showProgress() {

        // 读取Excel文件
        function readExcelFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        resolve(workbook);
                    } catch (error) {
                        log(`读取文件 ${file.name} 时出错: ${error.message}`, 'error');
                        reject(error);
                    }
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        // 获取工作表数据
        function getSheetData(workbook, sheetName = null) {
            const sheet = sheetName ? workbook.Sheets[sheetName] : workbook.Sheets[workbook.SheetNames[0]];
            const range = XLSX.utils.decode_range(sheet['!ref']);
            const data = [];
            for (let row = range.s.r; row <= range.e.r; row++) {
                const rowData = [];
                for (let col = range.s.c; col <= range.e.c; col++) {
                    const cellAddress = XLSX.utils.encode_cell({r: row, c: col});
                    const cell = sheet[cellAddress];
                    rowData.push(cell ? cell.v : '');
                }
                data.push(rowData);
            }
            return data;
        }

        // 创建图片画布
        function createImageCanvas(imageSource) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                let objectUrl = null;
                img.onload = function() {
                    if (objectUrl) URL.revokeObjectURL(objectUrl);
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    resolve({ canvas, ctx, width: img.width, height: img.height });
                };
                img.onerror = reject;
                if (imageSource instanceof File || imageSource instanceof Blob) {
                    objectUrl = URL.createObjectURL(imageSource);
                    img.src = objectUrl;
                } else {
                    img.src = imageSource;
                }
            });
        }

        // 绘制文字到画布
        function drawText(ctx, text, x, y, fontSize = 40, color = '#8B4513', fontFamily = 'Arial') {
            ctx.font = `${fontSize}px ${fontFamily}`;
            ctx.fillStyle = color;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(text, x, y);
        }

        // 绘制表格
        function drawTable(ctx, storeCounts, startX, startY, fontSize = 40) {
            const sortedStores = Object.entries(storeCounts)
                .sort(([,a], [,b]) => b - a);
            
            const rankWidth = 100;
            const storeWidth = 200;
            const countWidth = 210;
            const rowHeight = 91;
            
            let y = startY;
            
            // 绘制表头
            const rankTextWidth = ctx.measureText('排名').width;
            const countTextWidth = ctx.measureText('增长数量').width;
            drawText(ctx, '排名', startX + (rankWidth - rankTextWidth) / 2, y, fontSize, '#8B4513');
            drawText(ctx, '门店', 505, y, fontSize, '#8B4513');
            drawText(ctx, '增长数量', 825 + (countWidth - countTextWidth) / 2, y, fontSize, '#8B4513');
            y += rowHeight;
            
            // 绘制前7个门店
            for (let i = 0; i < Math.min(7, sortedStores.length); i++) {
                const [store, count] = sortedStores[i];
                const rank = (i >= 3) ? String(i + 1) : '';
                const countText = `${count}个`;
                
                const rankNumWidth = ctx.measureText(rank).width;
                const countNumWidth = ctx.measureText(countText).width;
                drawText(ctx, rank, startX + (rankWidth - rankNumWidth) / 2, y, fontSize, '#8B4513');
                drawText(ctx, store, 505, y, fontSize, '#8B4513');
                drawText(ctx, countText, 825 + (countWidth - countNumWidth) / 2, y, fontSize, '#8B4513');
                y += rowHeight;
            }
            
            // 绘制后7个门店
            y += 210;
            const rankTextWidth2 = ctx.measureText('排名').width;
            const countTextWidth2 = ctx.measureText('增长数量').width;
            drawText(ctx, '排名', startX + (rankWidth - rankTextWidth2) / 2, y, fontSize, '#000000');
            drawText(ctx, '门店', 505, y, fontSize, '#000000');
            drawText(ctx, '增长数量', 825 + (countWidth - countTextWidth2) / 2, y, fontSize, '#000000');
            y += rowHeight;
            
            const startIndex = Math.max(0, sortedStores.length - 7);
            for (let i = startIndex; i < sortedStores.length; i++) {
                const [store, count] = sortedStores[i];
                const rank = String(i + 1);
                const countText = `${count}个`;
                
                const rankNumWidth2 = ctx.measureText(rank).width;
                const countNumWidth2 = ctx.measureText(countText).width;
                drawText(ctx, rank, startX + (rankWidth - rankNumWidth2) / 2, y, fontSize, '#000000');
                drawText(ctx, store, 505, y, fontSize, '#000000');
                drawText(ctx, countText, 825 + (countWidth - countNumWidth2) / 2, y, fontSize, '#000000');
                y += rowHeight;
            }
        }

        // 处理抖音数据
        async function processDouyinData(year, startMonth, startDay, endMonth, endDay) {
            log('处理抖音好评数据...', 'info');
            
            // 读取Excel数据
            const douyinWorkbook = await readExcelFile(uploadedFiles['douyinExcel']);
            const douyinMapping = buildStoreMapping(storeMappingData['抖音']);
            // 读取抖音数据
            const douyinData = getSheetData(douyinWorkbook);
            const storeCounts = {};
            
            for (let i = 1; i < douyinData.length; i++) {
                const storeName = douyinData[i][0]; // 假设第一列是门店名称
                if (storeName) {
                    const mappedName = douyinMapping[String(storeName).trim()] || String(storeName).trim();
                    storeCounts[mappedName] = (storeCounts[mappedName] || 0) + 1;
                }
            }
            
            log(`抖音数据统计完成，共 ${Object.keys(storeCounts).length} 个门店`, 'success');
            
            // 处理图片
            const { canvas, ctx } = await createImageCanvas(getImageSource('douyinImage'));
            
            // 格式化月份为双位数
            const formattedStartMonth = String(startMonth).padStart(2, '0');
            const formattedEndMonth = String(endMonth).padStart(2, '0');
            
            // 绘制标题和日期
            drawText(ctx, year, 80, 295, 100, '#8B4513');
            const yearWidth = ctx.measureText(year).width;
            drawText(ctx, formattedStartMonth, 80 + yearWidth + 140, 295, 100, '#8B4513');
            
            // 绘制日期数字行
            drawText(ctx, formattedStartMonth, 300, 630, 60, '#8B4513');
            drawText(ctx, startDay, 325 + 110, 630, 60, '#8B4513');
            drawText(ctx, formattedEndMonth, 300 + 310, 630, 60, '#8B4513');
            drawText(ctx, endDay, 340 + 405, 630, 60, '#8B4513');
            
            // 绘制表格
            drawTable(ctx, storeCounts, 275, 900, 40);
            
            // 转换为Blob
            return new Promise(resolve => {
                canvas.toBlob(resolve, 'image/jpeg', 0.9);
            });
        }

        // 处理美团数据
        async function processMeituanData(year, startMonth, startDay, endMonth, endDay) {
            log('处理美团好评数据...', 'info');
            
            // 读取Excel数据
            const meituanWorkbook = await readExcelFile(uploadedFiles['meituanExcel']);
            const meituanMapping = buildStoreMapping(storeMappingData['美团']);
            // 读取美团数据
            const meituanData = getSheetData(meituanWorkbook);
            const storeCounts = {};
            
            // 使用第C列（索引2）作为门店名称，与Python程序一致
            for (let i = 1; i < meituanData.length; i++) {
                const storeName = meituanData[i][2]; // 第C列（评价门店列）
                if (storeName) {
                    const mappedName = meituanMapping[String(storeName).trim()] || String(storeName).trim();
                    storeCounts[mappedName] = (storeCounts[mappedName] || 0) + 1;
                }
            }
            
            log(`美团数据统计完成，共 ${Object.keys(storeCounts).length} 个门店`, 'success');
            
            // 处理图片
            const { canvas, ctx } = await createImageCanvas(getImageSource('meituanImage'));
            
            // 格式化月份为双位数
            const formattedStartMonth = String(startMonth).padStart(2, '0');
            const formattedEndMonth = String(endMonth).padStart(2, '0');
            
            // 绘制标题和日期
            drawText(ctx, year, 80, 295, 100, '#8B4513');
            const yearWidth = ctx.measureText(year).width;
            drawText(ctx, formattedStartMonth, 80 + yearWidth + 140, 295, 100, '#8B4513');
            
            // 绘制日期数字行
            drawText(ctx, formattedStartMonth, 300, 630, 60, '#8B4513');
            drawText(ctx, startDay, 325 + 110, 630, 60, '#8B4513');
            drawText(ctx, formattedEndMonth, 300 + 310, 630, 60, '#8B4513');
            drawText(ctx, endDay, 340 + 405, 630, 60, '#8B4513');
            
            // 绘制表格
            drawTable(ctx, storeCounts, 275, 900, 40);
            
            // 转换为Blob
            return new Promise(resolve => {
                canvas.toBlob(resolve, 'image/jpeg', 0.9);
            });
        }

        // 添加下载项到结果列表
        function addDownloadItem(filename, blob) {
            const downloadList = document.getElementById('downloadList');
            const item = document.createElement('div');
            item.className = 'download-item';
            
            const size = (blob.size / 1024).toFixed(1) + ' KB';
            
            item.innerHTML = `
                <div class="file-info">
                    <div class="file-name">${filename}</div>
                    <div class="file-size">大小: ${size}</div>
                </div>
                <button class="download-btn" onclick="downloadFile('${filename}')">下载</button>
            `;
            
            downloadList.appendChild(item);
            processedFiles[filename] = blob;

            // Preview
            const previewList = document.getElementById('previewList');
            if (previewList) {
                const url = URL.createObjectURL(blob);
                const card = document.createElement('div');
                card.className = 'preview-card';
                card.innerHTML = `
                    <img src="${url}" alt="${filename}">
                    <div class="preview-caption">${filename}</div>
                `;
                previewList.appendChild(card);

                const img = card.querySelector('img');
                if (img) {
                    img.onload = () => URL.revokeObjectURL(url);
                    img.onerror = () => URL.revokeObjectURL(url);
                }
            }
        }

        // 下载单个文件
        function downloadFile(filename) {
            const blob = processedFiles[filename];
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function getImageSource(imageKey) {
            return uploadedFiles[imageKey] || BUILTIN_IMAGE_URLS[imageKey];
        }

        function showResultsSection() {
            document.getElementById('resultsSection').style.display = 'block';
            document.getElementById('downloadAllBtn').style.display = 'inline-flex';
        }

        async function generateDouyinImage() {
            const dates = getDateInputs();

                alert('请先上传抖音好评表格');
                return;
            }

            log('🚀 开始生成抖音图片...', 'info');

                const douyinBlob = await processDouyinData(dates.year, dates.startMonth, dates.startDay, dates.endMonth, dates.endDay);
                addDownloadItem('抖音好评_标注.jpg', douyinBlob);
                updateProgress(100, '抖音图片生成完成！');

                log(`❌ 抖音图片生成失败: ${error.message}`, 'error');

        // 主要处理函数
        async function processData() {
            const dates = getDateInputs();
            if (!dates) return;

            const hasDouyin = !!uploadedFiles['douyinExcel'];
            const hasMeituan = !!uploadedFiles['meituanExcel'];
            if (!hasDouyin && !hasMeituan) {
                alert('请至少上传一个表格');
                return;
            }
            
            showProgress();
            log('🚀 开始处理数据...', 'info');
            // Clear previous results/previews
            document.getElementById('downloadList').innerHTML = '';
            const previewList = document.getElementById('previewList');
            if (previewList) previewList.innerHTML = '';
            
            try {
                let generated = 0;
                if (hasDouyin) {
                    updateProgress(hasMeituan ? 20 : 50, '处理抖音数据...');
                    const douyinBlob = await processDouyinData(dates.year, dates.startMonth, dates.startDay, dates.endMonth, dates.endDay);
                    addDownloadItem('抖音好评_标注.jpg', douyinBlob);
                    generated += 1;
                }

                if (hasMeituan) {
                    updateProgress(hasDouyin ? 80 : 50, '处理美团数据...');
                    const meituanBlob = await processMeituanData(dates.year, dates.startMonth, dates.startDay, dates.endMonth, dates.endDay);
                    addDownloadItem('美团好评_标注.jpg', meituanBlob);
                    generated += 1;
                }
                
                updateProgress(100, '处理完成！');
                log(`✅ 已生成 ${generated} 张图片`, 'success');
                
                showResultsSection();
                hideProgress();
                
            } catch (error) {
                log(`❌ 处理过程中出现错误: ${error.message}`, 'error');
                console.error('处理错误:', error);
                hideProgress();
            }
        }

        // 下载全部文件为ZIP压缩包
        async function downloadAllAsZip() {
            if (Object.keys(processedFiles).length === 0) {
                alert('没有可下载的文件！');
                return;
            }

            log('📦 开始创建ZIP压缩包...', 'info');
            
            try {
                const zip = new JSZip();
                const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
                
                for (const [filename, blob] of Object.entries(processedFiles)) {
                    zip.file(filename, blob);
                    log(`📁 添加文件到压缩包: ${filename}`, 'info');
                }
                
                log('📦 正在生成ZIP文件...', 'info');
                const zipBlob = await zip.generateAsync({type: 'blob'});
                
                const url = URL.createObjectURL(zipBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `每周一好评数统计结果_${timestamp}.zip`;
                a.click();
                
                URL.revokeObjectURL(url);
                
                log('✅ ZIP压缩包下载完成！', 'success');
                log(`📦 文件包含 ${Object.keys(processedFiles).length} 个图片文件`, 'info');
                
            } catch (error) {
                log(`❌ 创建ZIP文件失败: ${error.message}`, 'error');
                console.error('ZIP创建错误:', error);
            }
        }

        function initDateFields() {
            const today = new Date();
            const day = today.getDay();
            const diffToMonday = day === 0 ? -6 : 1 - day;
            const startDate = new Date(today);
            startDate.setDate(today.getDate() + diffToMonday);

            document.getElementById('yearInput').value = today.getFullYear();
            document.getElementById('startMonthInput').value = String(startDate.getMonth() + 1).padStart(2, '0');
            document.getElementById('startDayInput').value = String(startDate.getDate()).padStart(2, '0');
            document.getElementById('endMonthInput').value = String(today.getMonth() + 1).padStart(2, '0');
            document.getElementById('endDayInput').value = String(today.getDate()).padStart(2, '0');
        }

        // 页面加载完成后的初始化

        function initParallax() {
            const shapes = document.getElementById('bgShapes');
            const grid = document.getElementById('bgGridWrap');
            if (!shapes || !grid) return;
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth - 0.5) * 2;
                const y = (e.clientY / window.innerHeight - 0.5) * 2;
                shapes.style.transform = `translate(${x * 28}px, ${y * 20}px)`;
                grid.style.transform = `perspective(900px) rotateX(0deg) translate(${x * 12}px, ${y * 6}px)`;
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            storeMappingData = loadStoreMapping();
            initDateFields();
            setBuiltinMappingStatus();
            document.getElementById('fileMapping').style.display = 'block';
            initParallax();
        });
    </script>
